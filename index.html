<script type="text/javascript">
//fly.js处理
  fly.config.parseJson = true
  fly.config.headers = {
      'content-type': 'application/x-www-form-urlencoded',
  }
  var tipIndex
  fly.interceptors.request.use((request) => {
      let params = request.body
      // 此处可以参数加密
      request.timeout = 30000
      tipIndex = layer.msg(params.tips||'请求加载中', {icon: 16, time: -1})
      if(params['tips']){
    	delete params['tips']
      	request.body = params
      }
      return request
  })


  fly.interceptors.response.use(
      (response) => {
          layer.close(tipIndex)
          return response//请求成功之后将返回值返回
      },
      (err) => {
      	layer.close(tipIndex)
          console.log(err)
      }
  )
//end
  
  // 编辑模式切换函数
  function edit(){
      if (document.body.contentEditable == 'true') {
          // 保存修改的内容到本地存储
          // 先保存二维码容器的内容
          var qrcodeContainer = document.getElementById("qrcode");
          var qrcodeContent = qrcodeContainer.innerHTML;
          
          // 清空二维码容器，避免保存二维码到本地存储
          qrcodeContainer.innerHTML = '';
          
          // 保存内容到本地存储
          localStorage.setItem('pageContent', document.body.innerHTML);
          
          // 同时保存到sessionStorage，确保在同一浏览器会话中可用
          sessionStorage.setItem('pageContent', document.body.innerHTML);
          
          // 恢复二维码容器的内容
          qrcodeContainer.innerHTML = qrcodeContent;
          
          document.body.contentEditable = 'false';
          alert("只读模式");
      } else {
          document.body.contentEditable = 'true';
          alert("编辑模式");
      }
  }
  
  // 页面加载完成后执行
  $(function() {
      // 从存储中恢复内容，优先从sessionStorage读取
      var savedContent = sessionStorage.getItem('pageContent');
      if (!savedContent) {
          savedContent = localStorage.getItem('pageContent');
      }
      if (savedContent) {
          document.body.innerHTML = savedContent;
      }
      
      // 清空二维码容器，避免重复生成
      var qrcodeContainer = document.getElementById("qrcode");
      if (qrcodeContainer) {
          qrcodeContainer.innerHTML = '';
      }
      
      // 生成二维码，扫描后打开当前页面
      setTimeout(function() {
          var currentUrl = "https://ljc-bssg.github.io";
          var qrcode = new QRCode(document.getElementById("qrcode"), {
              text: currentUrl,
              width: 120,
              height: 120,
              colorDark: "#000000",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.H
          });
      }, 100);
  });
  
  // 页面可见性变化时重新生成二维码
  document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
          // 页面变为可见时，重新生成二维码
          var qrcodeContainer = document.getElementById("qrcode");
          if (qrcodeContainer) {
              qrcodeContainer.innerHTML = '';
              var currentUrl = "https://ljc-bssg.github.io";
              var qrcode = new QRCode(qrcodeContainer, {
                  text: currentUrl,
                  width: 120,
                  height: 120,
                  colorDark: "#000000",
                  colorLight: "#ffffff",
                  correctLevel: QRCode.CorrectLevel.H
              });
          }
      }
  });
  
  </script>

function checkPhone(opts) {
	var mobile = opts.value;// $(opts.target).val();
	var flag = false;
    var tel = /^0\d{2,3}-?\d{7,8}$/;
    var phone = /^(((13[0-9]{1})|(15[0-9]{1})|(18[0-9]{1}))+\d{8})$/; 
    if(mobile.length == 11){//手机号码
      if(phone.test(mobile)) {
        flag = true;
      }
    }else if(mobile.length == 13 && mobile.indexOf("-") != -1 ){//电话号码
      if(tel.test(mobile)) {
        console.log(mobile);
        flag = true;
      }
    }
 	if(!flag){
 		layer.msg("电话号码格式不正确，请重新填写");
 		$(opts).attr("value","");
         return false;
 	}   
 	
 }

function calculateTime1() {
    let stime = $("#start_time").datetimePicker().val();
    let etime = $("#end_time").datetimePicker().val();
    // console.log(stime,etime)
    if ("" != stime && "" != etime) {

        fly.get("/xsgl/qjc/caculateQjts", {
            startTime: stime,
            endTime: etime,
        }).then(res => {
            $.hideLoading()
            console.log(res)
            res = res.data
            if ("1" == res.status) {
                $("#timeInterval").val(res.qjts + "天【超过4小时为按一天计算】")
                $("#qj_time").val(res.qjts)
            } else {
                $("#timeInterval").val("选完时间，系统自动计算请假时长！")
                $("#qj_time").val("0")
                $.alert("功能似乎出问题了！", res.message)
            }
        }).catch(err => {
            console.log(err)
            $.hideLoading()
            $.alert("连接异常！", "网络错误")

    	$.get("/xsgl/qjc/caculateQjts",{startTime: stime,endTime: etime},function(data){
